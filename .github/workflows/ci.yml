name: Vulnerable CI

on: [push, pull_request]

jobs:
  build:
    # VULNERABILITY: Running CI with overly broad permissions
    permissions:
      contents: write
      actions: write
      security-events: write
    runs-on: ubuntu-latest
    steps:
    # VULNERABILITY: Unpinned third-party action
    - uses: actions/checkout@v2

    # VULNERABILITY: Hardcoded secrets in workflow
    - name: Build
      env:
        API_KEY: sk-1234567890abcdef
        DB_PASSWORD: SuperSecretPassword123!
      run: |
        echo "Building with $API_KEY"

    # VULNERABILITY: Running untrusted code without sandboxing
    - name: Run user scripts
      run: |
        chmod +x ./scripts/*.sh
        ./scripts/build.sh

    # VULNERABILITY: Storing secrets in artifacts
    - name: Upload artifacts
      uses: actions/upload-artifact@v2
      with:
        name: build-output
        path: |
          ./dist
          ./config/secrets.yml
